sentence=A compact cooperative scheduler with static memory allocation for AVR Arduino boards.
paragraph=MTW TinyLoopScheduler provides periodic, delayed, posted, polling, ISR-deferred and step-based PARTED task execution without dynamic memory allocation. Scheduler subsystems and fixed-capacity queue profiles are selected at compile time for predictable SRAM and Flash usage.
